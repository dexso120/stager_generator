{{ define "layouts/header.html" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
        }

        nav {
            background-color: #2c3e50;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 56px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }

        nav .brand {
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            margin-right: 2rem;
            text-decoration: none;
        }

        nav a {
            color: #bdc3c7;
            text-decoration: none;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: background-color 0.2s, color 0.2s;
        }

        nav a:hover {
            background-color: #3d5166;
            color: white;
        }

        nav a.active {
            background-color: #4f8ef7;
            color: white;
        }

        .page {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 96px);
        }
    </style>
</head>
<body>
    <nav>
        <a class="brand" href="#">Stager Generator</a>
        <a href="/home" {{ if eq .Active "home" }}class="active"{{ end }}>Home</a>
        <a href="/obfuscation_page" {{ if eq .Active "obfuscation_page" }}class="active"{{ end }}>JScript Stager</a>
        <a href="/ps_loader_page" {{ if eq .Active "ps_loader_page" }}class="active"{{ end }}>Powershell Stager</a>
    </nav>
{{ end }}
